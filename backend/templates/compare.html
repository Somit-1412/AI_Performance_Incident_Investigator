<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Performance Comparison</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">

    <div class="container">

        <a class="navbar-brand" href="/">
            AI Incident Investigator
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="/">
                Home
            </a>

            <a class="nav-link" href="/dashboard">
                Dashboard
            </a>

            <a class="nav-link" href="/grafana">
                Grafana
            </a>

            <a class="nav-link" href="/chaos">
                Chaos Testing
            </a>

            <a class="nav-link" href="/history-dashboard">
                History
            </a>

            <a class="nav-link active" href="/compare-dashboard">
                Compare
            </a>

            <a class="nav-link" href="/trends-dashboard">
                Trends
            </a>

        </div>

    </div>

</nav>

<div class="container py-5">

    <h1 class="mb-5">
        Performance Regression Analysis
    </h1>

    <div id="comparison-content">

        <div class="alert alert-info">
            Loading comparison...
        </div>

    </div>

</div>

<script>

async function loadComparison() {

    const container =
        document.getElementById(
            "comparison-content"
        );

    try {

        const response =
            await fetch("/compare");

        const data =
            await response.json();

        if (data.status === "failure") {

            container.innerHTML = `

                <div class="alert alert-warning">
                    ${data.message}
                </div>

            `;

            return;
        }

        const latencyClass =
            data.latency_change_percent > 0
                ? "alert-danger"
                : "alert-success";

        const throughputClass =
            data.throughput_change_percent < 0
                ? "alert-danger"
                : "alert-success";

        const errorClass =
            data.error_change_percent > 0
                ? "alert-danger"
                : "alert-success";

        container.innerHTML = `

            <div class="card bg-secondary mb-4">

                <div class="card-body">

                    <h3>Compared Tests</h3>

                    <hr>

                    <p>
                        <strong>Latest:</strong>
                        ${data.latest_test}
                    </p>

                    <p>
                        <strong>Previous:</strong>
                        ${data.previous_test}
                    </p>

                </div>

            </div>

            <div class="alert ${latencyClass}">

                <strong>Latency Change:</strong>

                ${data.latency_change_percent}%

            </div>

            <div class="alert ${throughputClass}">

                <strong>Throughput Change:</strong>

                ${data.throughput_change_percent}%

            </div>

            <div class="alert ${errorClass}">

                <strong>Error Rate Change:</strong>

                ${data.error_change_percent}%

            </div>

            <div class="card bg-secondary mt-4">

                <div class="card-body">

                    <h3>
                        AI Comparative Analysis
                    </h3>

                    <hr>

                    <div>
                        ${marked.parse(data.ai_analysis)}
                    </div>

                </div>

            </div>

        `;

    } catch (error) {

        container.innerHTML = `

            <div class="alert alert-danger">
                Failed to load comparison.
            </div>

        `;
    }
}

loadComparison();

</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</body>

</html>
