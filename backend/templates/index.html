<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Performance Incident Investigator</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    >

    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">

        <div class="container">

            <a class="navbar-brand" href="/">
                AI Incident Investigator
            </a>

            <div class="navbar-nav">

                <a class="nav-link" href="/">
                    Home
                </a>

                <a class="nav-link" href="/dashboard">
                    Dashboard
                </a>

                <a class="nav-link" href="/grafana">
                    Grafana
                </a>

                <a class="nav-link" href="/chaos">
                    Chaos Testing
                </a>

                <a class="nav-link" href="/history-dashboard">
                    History
                </a>

                <a class="nav-link" href="/compare-dashboard">
                    Compare
                </a>

            </div>

        </div>

    </nav>

<div class="container py-5">

    <h1 class="mb-4">
        AI Performance Incident Investigator
    </h1>

    <div class="card bg-secondary p-4 mb-4">

        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">
                    Base URL
                </label>

                <input
                    type="text"
                    id="baseUrl"
                    class="form-control"
                    placeholder="http://localhost:5000"
                >

            <div class="col-md-6">
                <label class="form-label">
                    Endpoint Path
                </label>

                <input
                    type="text"
                    id="path"
                    class="form-control"
                    placeholder="/fast"
                >
            </div>
            
            <div class="col-md-12">

                <label class="form-label">
                    Customer Journey Endpoints
                </label>

                <textarea
                    id="journeyEndpoints"
                    class="form-control"
                    rows="5"
                    placeholder="/login&#10;/products&#10;/cart&#10;/checkout"
                ></textarea>

            </div>

            <div class="col-md-4">
                <label class="form-label">
                    Virtual Users
                </label>

                <input
                    type="number"
                    id="users"
                    class="form-control"
                    placeholder="50"
                >
            </div>

            <div class="col-md-4">
                <label class="form-label">
                    Ramp-Up Seconds
                </label>

                <input
                    type="number"
                    id="rampup"
                    class="form-control"
                    placeholder="5"
                >
            </div>

            <div class="col-md-4">
                <label class="form-label">
                    Loop Count
                </label>

                <input
                    type="number"
                    id="loops"
                    class="form-control"
                    placeholder="5"
                >
            </div>

            <div class="col-md-4">

                <label class="form-label">
                    Think Time (ms)
                </label>

                <input
                    type="number"
                    id="timer"
                    class="form-control"
                    placeholder="500"
                >

            </div>

        </div>

        <button
            id="startButton"
            onclick="startTest()"
            class="btn btn-primary mt-4"
        >
            Start Test
        </button>

    </div>


</div>

<script
    src="{{ url_for('static', filename='script.js') }}"
></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</body>
</html>
