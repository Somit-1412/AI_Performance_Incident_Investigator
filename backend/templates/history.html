<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Test History</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">

    <div class="container">

        <a class="navbar-brand" href="/">
            AI Incident Investigator
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="/">
                Home
            </a>

            <a class="nav-link" href="/dashboard">
                Dashboard
            </a>

            <a class="nav-link" href="/grafana">
                Grafana
            </a>

            <a class="nav-link" href="/chaos">
                Chaos Testing
            </a>

            <a class="nav-link active" href="/history-dashboard">
                History
            </a>

            <a class="nav-link" href="/compare-dashboard">
                Compare
            </a>

        </div>

    </div>

</nav>

<div class="container py-5">

    <h1 class="mb-5">
        Historical Test Results
    </h1>

    <div id="history-content">

        <div class="alert alert-info">
            Loading history...
        </div>

    </div>

</div>

<script>

async function loadHistory() {

    const container =
        document.getElementById(
            "history-content"
        );

    try {

        const response =
            await fetch("/history");

        const data =
            await response.json();

        if (data.length === 0) {

            container.innerHTML = `

                <div class="alert alert-warning">
                    No historical tests found.
                </div>

            `;

            return;
        }

        container.innerHTML = data.map(test => `

            <div class="card bg-secondary mb-4">

                <div class="card-body">

                    <h4>${test.file}</h4>

                    <hr>

                    <p>
                        <strong>Average Latency:</strong>
                        ${test.results.average_latency_ms} ms
                    </p>

                    <p>
                        <strong>P95:</strong>
                        ${test.results.p95_latency_ms} ms
                    </p>

                    <p>
                        <strong>Error %:</strong>
                        ${test.results.error_percentage}%
                    </p>

                    <p>
                        <strong>Throughput:</strong>
                        ${test.results.throughput_rps} req/sec
                    </p>

                    <p>
                        <strong>Total Requests:</strong>
                        ${test.results.total_requests}
                    </p>

                </div>

            </div>

        `).join("");

    } catch (error) {

        container.innerHTML = `

            <div class="alert alert-danger">
                Failed to load history.
            </div>

        `;
    }
}

loadHistory();

</script>

</body>

</html>
